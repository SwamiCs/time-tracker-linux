name: Build Linux App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libjpeg-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgif-dev \
            librsvg2-dev \
            libpixman-1-dev \
            libfontconfig1-dev \
            scrot \
            xdotool \
            wmctrl

      - name: Create .env from Secrets
        run: |
          echo "${{ secrets.ENV }}" > .env

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Electron App for Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Builds
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

      - name: Automated Xvfb Testing
        run: |
          sudo apt-get install -y xvfb dbus-x11
          # Install the built .deb file
          sudo dpkg -i dist/*.deb || sudo apt-get install -f -y
          
          # Find the exact executable path dynamically since it might be /opt/Time-Tracker/time-tracker or similar
          APP_EXEC=$(find /opt -type f -executable -iname "*time-tracker*" | head -n 1)
          echo "Found executable at: $APP_EXEC"
          
          # Run the application headless for 15 seconds to ensure it doesn't crash on Wayland/Linux
          xvfb-run -a --server-args="-screen 0 1024x768x24" "$APP_EXEC" --no-sandbox --ozone-platform-hint=auto > electron.log 2>&1 &
          PID=$!
          sleep 15
          
          # If it crashes, it will exit prematurely. Check if process is still running.
          if kill -0 $PID 2>/dev/null; then
            echo "SUCCESS: Application remained active during Wayland simulation!"
            kill -9 $PID
          else
            echo "FAILED: Application crashed during testing."
            cat electron.log
            exit 1
          fi
